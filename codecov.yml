# ── Components ────────────────────────────────────────────────────────────────
# Each component links to its flag via flag_regexes.  Because both
# flag_regexes AND paths are set, a file must satisfy BOTH to belong to the
# component (Codecov AND-style logic).  This keeps flag-level and
# component-level grouping in sync without any upload-time changes.
component_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        target: auto
        threshold: 1%
      - type: patch
        target: 80%
        threshold: 1%
  individual_components:
    - component_id: candy-core
      name: candy-core
      paths:
        - "candy-core/src/**"
      flag_regexes:
        - "^candy-core$"
    - component_id: candy-ansi
