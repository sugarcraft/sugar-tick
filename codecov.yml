# Codecov config — one flag + one component per lib so each package has its
# own badge, per-PR coverage diff, and diff-component breakdown in the
# SugarCraft monorepo.
#
# Coverage is reported by the `coverage:` job in .github/workflows/ci.yml,
# which iterates the same lib list and uploads `<lib>/coverage.xml` with
# `-F <lib>` (the flag).  Codecov carries forward each flag's coverage so
# untouched libs don't go to zero between commits.
#
# Flags:   defined in `flag_management` → controls upload-level behaviour
#          (carryforward, status checks, PR comment flags section).
# Components: defined in `component_management` → groups coverage by path
#          server-side using `flag_regexes` (AND-style with paths) so each
#          lib gets its own diff table in PR comments and component history
#          in the Codecov UI.

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%
        threshold: 1%

comment:
  layout: "header, diff, flags, components"
  require_changes: false

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: candy-core
      paths: ["candy-core/src/**"]
      carryforward: true
