name: VHS demos

on:
  push:
    branches: [master]
    paths:
      - '*/.vhs/*.tape'
      - '*/examples/**'
      - '*/src/**'
      - '*/bin/**'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        lib:
          - candy-core
          - candy-sprinkles
          - sugar-bits
          - sugar-charts
          - sugar-prompt
          - candy-shell
          - candy-shine
          - candy-kit
          - candy-freeze
          - sugar-glow
          - sugar-spark
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pcntl
          tools: composer:v2
          coverage: none

      - name: Install lib deps
        working-directory: ${{ matrix.lib }}
        run: composer install --prefer-dist --no-progress

      - name: Render every .tape in ${{ matrix.lib }}/.vhs/
        if: hashFiles(format('{0}/.vhs/*.tape', matrix.lib)) != ''
        uses: charmbracelet/vhs-action@v2
        with:
          path: ${{ matrix.lib }}/.vhs/

      - name: Commit rendered GIFs
        if: hashFiles(format('{0}/.vhs/*.gif', matrix.lib)) != ''
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ${{ matrix.lib }}/.vhs/*.gif
          if ! git diff --cached --quiet; then
            git commit -m "vhs: regenerate ${{ matrix.lib }} demo GIFs"
            git push
          fi
