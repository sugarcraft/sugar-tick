name: VHS demos

env:
  # Belt-and-suspenders: every action below is already pinned to its
  # Node-24-native major (checkout@v5, cache@v5, upload-artifact@v5,
  # download-artifact@v5), but this flag keeps any transitively-loaded
  # JavaScript action that still defaults to Node 20 from generating
  # deprecation warnings. Requires Actions Runner ≥ 2.327.1.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [master]
    paths:
      - '*/.vhs/*.tape'
      - '*/examples/**'
      - '*/src/**'
      - '*/bin/**'
      - '.github/workflows/vhs.yml'
  workflow_dispatch:

# Queue concurrent renders rather than cancelling them. Each push
# may target a different lib; cancelling the in-flight render to
# start a new one would discard rendered-but-not-yet-committed
# GIFs. Slower but no lost work.
concurrency:
  group: vhs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Decide which libs need re-rendering. VHS encoding is
  # non-deterministic at both byte and frame levels (font cache
  # state, cursor-blink phase, timing variation), so post-render
  # content comparison doesn't reliably detect 'no real change'.
  # Skip the render entirely if a lib's src/, examples/, bin/, or
  # .vhs/*.tape didn't change in this push. workflow_dispatch
  # (manual trigger) and the first commit on a branch render
  # everything.
  changed:
    runs-on: ubuntu-latest
    outputs:
      libs: ${{ steps.compute.outputs.libs }}
      vhs_version: ${{ steps.tools.outputs.vhs }}
      ttyd_version: ${{ steps.tools.outputs.ttyd }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2   # need HEAD~1 for the diff

      - name: Resolve vhs / ttyd versions
        id: tools
        run: |
          set -euo pipefail

          retry_gh_api() {
            local max_attempts=3
            local delay=10
            for ((attempt=1; attempt<=max_attempts; attempt++)); do
              local status
              status=$(curl -sSL -o /dev/null -w "%{http_code}" "$1")
              if [[ "$status" == "200" ]]; then
                return 0
              fi
              echo "HTTP $status, waiting ${delay}s before retry $attempt/$max_attempts..."
              sleep $delay
              delay=$((delay * 3))
            done
            return 1
          }

          # Get VHS version
          retry_gh_api "https://api.github.com/repos/charmbracelet/vhs/releases/latest"
          vhs_tag=$(curl -sSL "https://api.github.com/repos/charmbracelet/vhs/releases/latest" | jq -r .tag_name)

          # Get ttyd version
          retry_gh_api "https://api.github.com/repos/tsl0922/ttyd/releases/latest"
          ttyd_tag=$(curl -sSL "https://api.github.com/repos/tsl0922/ttyd/releases/latest" | jq -r .tag_name)

          echo "vhs=$vhs_tag"
          echo "ttyd=$ttyd_tag"
          echo "vhs=$vhs_tag" >> "$GITHUB_OUTPUT"
          echo "ttyd=$ttyd_tag" >> "$GITHUB_OUTPUT"

      - id: compute
        run: |
          set -euo pipefail
          all=(
            candy-core candy-sprinkles candy-pty candy-vcr honey-bounce
            sugar-bits sugar-charts sugar-prompt
            candy-shell candy-shine candy-kit candy-freeze
            sugar-glow sugar-spark sugar-wishlist
            candy-mold candy-tetris super-candy sugar-crush
            candy-vt
            sugar-stash candy-query sugar-tick
            candy-mines candy-mosaic candy-flip honey-flap
            candy-hermit candy-lister candy-log candy-metrics
            candy-palette candy-serve candy-wish candy-zone
            sugar-boxer sugar-calendar sugar-crumbs sugar-dash sugar-post
            sugar-readline sugar-skate sugar-stickers sugar-table
            sugar-toast sugar-veil
          )
          # Render-all triggers: manual dispatch, or a workflow-file
          # change (in which case we want to verify the new pipeline
          # works for every lib).
          force_all=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            force_all=true
          elif git diff --name-only HEAD~1 HEAD -- .github/workflows/vhs.yml | grep -q .; then
            force_all=true
          fi

          out="["
          for lib in "${all[@]}"; do
            keep=false
            if $force_all; then
              keep=true
            elif git diff --name-only HEAD~1 HEAD 2>/dev/null \
                 | grep -qE "^${lib}/(src|examples|bin|\.vhs)/"; then
              keep=true
            fi
            if $keep; then
              out+="\"$lib\","
            fi
          done
          out="${out%,}]"
          if [ "$out" = "]" ]; then
            out="[]"
          fi
          echo "libs=$out"
          echo "libs=$out" >> "$GITHUB_OUTPUT"

  # DEBUG: test if render job matrix would expand
  debug-render:
    needs: changed
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "libs: ${{ needs.changed.outputs.libs }}"
          echo "libs length: $(echo '${{ needs.changed.outputs.libs }}' | jq -r 'length')"
          echo "vhs_version: ${{ needs.changed.outputs.vhs_version }}"
          echo "ttyd_version: ${{ needs.changed.outputs.ttyd_version }}"

  render:
    needs: changed
    if: needs.changed.outputs.libs != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        lib: ${{ fromJSON(needs.changed.outputs.libs) }}
        vhs_version: ${{ needs.changed.outputs.vhs_version }}
        ttyd_version: ${{ needs.changed.outputs.ttyd_version }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pcntl
          tools: composer:v2
          coverage: none

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ matrix.lib }}/vendor/
            ~/.composer/cache/
          key: composer-${{ matrix.lib }}-${{ hashFiles(format('{0}/composer.json', matrix.lib)) }}
          restore-keys: |
            composer-${{ matrix.lib }}-

      - name: Install lib deps
        working-directory: ${{ matrix.lib }}
        run: composer install --prefer-dist --no-progress

      # Cache the vhs + ttyd binaries by their resolved upstream
      # version. Saves ~30 seconds of API + tarball + extract per job.
      - name: Restore cached vhs + ttyd
        if: hashFiles(format('{0}/.vhs/*.tape', matrix.lib)) != ''
        id: cache-bins
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/bin/vhs
            /usr/local/bin/ttyd
          key: vhs-${{ matrix.vhs_version }}-ttyd-${{ matrix.ttyd_version }}-linux-amd64

      - name: Install vhs + ttyd (cache miss)
        if: hashFiles(format('{0}/.vhs/*.tape', matrix.lib)) != '' && steps.cache-bins.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          # vhs asset name embeds the version — get download URL via GitHub API with retry
          get_vhs_url() {
            local max_attempts=3
            local delay=10
            local attempt=1
            while (( attempt <= max_attempts )); do
              local response
              response=$(curl -sSL -w "\n%{http_code}" "https://api.github.com/repos/charmbracelet/vhs/releases/latest")
              local status=$(echo "$response" | tail -1)
              local body=$(echo "$response" | sed '$d')
              if [[ "$status" == "200" ]]; then
                echo "$body" | jq -r '.assets[] | select(.name | endswith("Linux_x86_64.tar.gz")) | .browser_download_url' | head -1
                return 0
              elif [[ "$status" == "403" ]] || [[ "$status" == "429" ]]; then
                echo "Rate limited (HTTP $status), waiting ${delay}s before retry $attempt/$max_attempts..." >&2
                sleep $delay
                delay=$((delay * 3))
                ((attempt++))
              else
                echo "Non-retryable error (HTTP $status) after $attempt attempt(s)" >&2
                return 1
              fi
            done
            echo "Max retries exceeded" >&2
            return 1
          }
          vhs_url=$(get_vhs_url)
          curl -sSL "$vhs_url" \
            | sudo tar -xz -C /usr/local/bin --strip-components=1 --wildcards '*/vhs'
          sudo chmod +x /usr/local/bin/vhs

          curl -sSL -o /tmp/ttyd "https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64"
          sudo install -m 0755 /tmp/ttyd /usr/local/bin/ttyd

      - name: Cache ffmpeg
        if: hashFiles(format('{0}/.vhs/*.tape', matrix.lib)) != ''
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: ffmpeg
          version: 1.0.0

      - name: Install ffmpeg (fallback)
        if: hashFiles(format('{0}/.vhs/*.tape', matrix.lib)) != '' && steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          # Skip the slow PPA refreshes — ffmpeg is in the default
          # ubuntu archive which the runner image already has indexed.
          # Fall back to a full update if the direct install fails.
          sudo apt-get install -y --no-install-recommends ffmpeg \
            || (sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg)

      - name: Verify tools
        if: hashFiles(format('{0}/.vhs/*.tape', matrix.lib)) != ''
        run: |
          vhs --version
          ttyd --version
          ffmpeg -version | head -1

      - name: Render every .tape in ${{ matrix.lib }}/.vhs/
        if: hashFiles(format('{0}/.vhs/*.tape', matrix.lib)) != ''
        working-directory: ${{ matrix.lib }}
        run: |
          set -euo pipefail
          for tape in .vhs/*.tape; do
            echo "▶ rendering $tape"
            vhs "$tape"
          done
          echo "rendered files in $(pwd):"
          find .vhs -type f | sort

      - name: Upload rendered GIFs as artifact
        if: hashFiles(format('{0}/.vhs/*.tape', matrix.lib)) != ''
        uses: actions/upload-artifact@v5
        with:
          name: gifs-${{ matrix.lib }}
          path: ${{ matrix.lib }}/.vhs/*.gif
          if-no-files-found: warn
          # The .vhs/ directory is dot-prefixed; upload-artifact@v4
          # ignores hidden paths by default. Override to include them.
          include-hidden-files: true
          retention-days: 1

  # Single aggregate-commit job. Runs once after every render finishes.
  # Replaces the per-job push that race-collided when 16 parallel jobs
  # each tried to push to master at the same time.
  commit:
    needs: render
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all GIF artifacts
        uses: actions/download-artifact@v5
        with:
          path: /tmp/gifs
          pattern: gifs-*

      - name: Move GIFs into their lib's .vhs/ dir
        run: |
          set -euo pipefail
          shopt -s nullglob
          for d in /tmp/gifs/gifs-*; do
            lib="${d#/tmp/gifs/gifs-}"
            mkdir -p "$lib/.vhs"
            cp -v "$d"/*.gif "$lib/.vhs/" || true
          done

      - name: Commit + push
        run: |
          set -euo pipefail
          git config user.name  'Joe Huss'
          git config user.email 'detain@interserver.net'
          git add */.vhs/*.gif
          if git diff --cached --quiet; then
            echo "no GIF changes — skipping commit"
            exit 0
          fi
          git commit -m "vhs: regenerate demo GIFs"
          # Single push — no concurrent jobs means no race. If something
          # else pushed during this run, rebase + retry once.
          git push || (git pull --rebase origin master && git push)
