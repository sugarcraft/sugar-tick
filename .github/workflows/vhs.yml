name: VHS demos

env:
  # Belt-and-suspenders: every action below is already pinned to its
  # Node-24-native major (checkout@v5, cache@v5, upload-artifact@v5,
  # download-artifact@v5), but this flag keeps any transitively-loaded
  # JavaScript action that still defaults to Node 20 from generating
  # deprecation warnings. Requires Actions Runner ≥ 2.327.1.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [master]
    paths:
      - '*/.vhs/*.tape'
      - '*/examples/**'
      - '*/src/**'
      - '*/bin/**'
      - '.github/workflows/vhs.yml'
  workflow_dispatch:

# Queue concurrent renders rather than cancelling them. Each push
# may target a different lib; cancelling the in-flight render to
# start a new one would discard rendered-but-not-yet-committed
# GIFs. Slower but no lost work.
concurrency:
  group: vhs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Decide which libs need re-rendering. VHS encoding is
  # non-deterministic at both byte and frame levels (font cache
  # state, cursor-blink phase, timing variation), so post-render
  # content comparison doesn't reliably detect 'no real change'.
  # Skip the render entirely if a lib's src/, examples/, bin/, or
  # .vhs/*.tape didn't change in this push. workflow_dispatch
  # (manual trigger) and the first commit on a branch render
  # everything.
  changed:
    runs-on: ubuntu-latest
    outputs:
      libs: ${{ steps.compute.outputs.libs }}
      vhs_version: ${{ steps.tools.outputs.vhs }}
      ttyd_version: ${{ steps.tools.outputs.ttyd }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2   # need HEAD~1 for the diff

      - name: Resolve vhs / ttyd versions
        id: tools
        env:
          # Use the workflow's GITHUB_TOKEN to authenticate API calls.
          # Unauthenticated api.github.com requests are rate-limited to
          # 60/hour per runner IP — easily blown by parallel runs across
          # the org. Authenticated requests get 5000/hour. The previous
          # curl + retry loop just burned 130s sleeping into HTTP 403s
          # before exiting the changed job entirely.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          vhs_tag=$(gh release view --repo charmbracelet/vhs --json tagName -q .tagName)
          ttyd_tag=$(gh release view --repo tsl0922/ttyd --json tagName -q .tagName)
          echo "vhs=$vhs_tag"
          echo "ttyd=$ttyd_tag"
          echo "vhs=$vhs_tag" >> "$GITHUB_OUTPUT"
          echo "ttyd=$ttyd_tag" >> "$GITHUB_OUTPUT"

      - id: compute
        run: |
          set -euo pipefail
          all=(
            candy-core candy-sprinkles candy-pty candy-vcr honey-bounce
            sugar-bits sugar-charts sugar-prompt
            candy-shell candy-shine candy-kit candy-freeze
            sugar-glow sugar-spark sugar-wishlist
            candy-mold candy-tetris super-candy sugar-crush
            candy-vt
            sugar-stash candy-query sugar-tick
            candy-mines candy-mosaic candy-flip honey-flap
            candy-hermit candy-lister candy-log candy-metrics
            candy-palette candy-serve candy-wish candy-zone
            sugar-boxer sugar-calendar sugar-crumbs sugar-dash sugar-post
            sugar-readline sugar-skate sugar-stickers sugar-table
            sugar-toast sugar-veil
          )
          # Render-all triggers: manual dispatch, or a workflow-file
          # change (in which case we want to verify the new pipeline
          # works for every lib).
          force_all=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            force_all=true
          elif git diff --name-only HEAD~1 HEAD -- .github/workflows/vhs.yml | grep -q .; then
            force_all=true
          fi

          out="["
          for lib in "${all[@]}"; do
            keep=false
            if $force_all; then
              keep=true
            elif git diff --name-only HEAD~1 HEAD 2>/dev/null \
                 | grep -qE "^${lib}/(src|examples|bin|\.vhs)/"; then
              keep=true
            fi
            if $keep; then
              out+="\"$lib\","
            fi
          done
          out="${out%,}]"
          if [ "$out" = "]" ]; then
            out="[]"
          fi
          echo "libs=$out"
          echo "libs=$out" >> "$GITHUB_OUTPUT"

  render:
    needs: changed
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Single-key matrix — declaring vhs/ttyd versions here would
        # cartesian-product to 46×N×N jobs and exceed the 256-per-run
        # limit, blowing up the workflow before any job starts. Version
        # info is consumed from needs.changed.outputs.{vhs,ttyd}_version.
        lib: [candy-core, candy-sprinkles, candy-pty, candy-vcr, honey-bounce, sugar-bits, sugar-charts, sugar-prompt, candy-shell, candy-shine, candy-kit, candy-freeze, sugar-glow, sugar-spark, sugar-wishlist, candy-mold, candy-tetris, super-candy, sugar-crush, candy-vt, sugar-stash, candy-query, sugar-tick, candy-mines, candy-mosaic, candy-flip, honey-flap, candy-hermit, candy-lister, candy-log, candy-metrics, candy-palette, candy-serve, candy-wish, candy-zone, sugar-boxer, sugar-calendar, sugar-crumbs, sugar-dash, sugar-post, sugar-readline, sugar-skate, sugar-stickers, sugar-table, sugar-toast, sugar-veil]
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          # ssh2 is required by candy-serve (ext-ssh2 in composer.json).
          # The other libs that declare ext-* requirements (candy-flip,
          # candy-pty, candy-query, sugar-skate) install cleanly on the
          # default Ubuntu runner without explicit extension setup.
          extensions: mbstring, intl, pcntl, ssh2
          tools: composer:v2
          coverage: none

      - name: Check if lib needs rendering
        id: check
        env:
          LIBS_JSON: ${{ needs.changed.outputs.libs }}
          LIB: ${{ matrix.lib }}
        run: |
          set -euo pipefail
          # Delegate the "should I render?" decision to the changed
          # job — it already handles workflow_dispatch, the workflow
          # file-changed case, and the per-path diff. Re-deriving the
          # logic here with shallow checkouts (fetch-depth=1, no HEAD~1)
          # produced silent false negatives.
          if jq -e --arg lib "$LIB" 'index($lib) != null' <<<"$LIBS_JSON" >/dev/null; then
            echo "needs_render=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_render=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache composer dependencies
        if: steps.check.outputs.needs_render == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ${{ matrix.lib }}/vendor/
            ~/.composer/cache/
          key: composer-${{ matrix.lib }}-${{ hashFiles(format('{0}/composer.json', matrix.lib)) }}
          restore-keys: |
            composer-${{ matrix.lib }}-

      - name: Install lib deps
        if: steps.check.outputs.needs_render == 'true'
        working-directory: ${{ matrix.lib }}
        run: composer install --prefer-dist --no-progress

      # Cache the vhs + ttyd binaries by their resolved upstream
      # version. Saves ~30 seconds of API + tarball + extract per job.
      - name: Restore cached vhs + ttyd
        if: steps.check.outputs.needs_render == 'true' && hashFiles(format('{0}/.vhs/*.tape', matrix.lib)) != ''
        id: cache-bins
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/bin/vhs
            /usr/local/bin/ttyd
          key: vhs-${{ needs.changed.outputs.vhs_version }}-ttyd-${{ needs.changed.outputs.ttyd_version }}-linux-amd64

      - name: Install vhs + ttyd (cache miss)
        if: steps.check.outputs.needs_render == 'true' && hashFiles(format('{0}/.vhs/*.tape', matrix.lib)) != '' && steps.cache-bins.outputs.cache-hit != 'true'
        env:
          # Same rationale as the changed.tools step — authenticate to
          # avoid the 60/hour anonymous api.github.com rate limit.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release download --repo charmbracelet/vhs \
            --pattern '*Linux_x86_64.tar.gz' \
            --output /tmp/vhs.tar.gz --clobber
          sudo tar -xz -f /tmp/vhs.tar.gz -C /usr/local/bin --strip-components=1 --wildcards '*/vhs'
          sudo chmod +x /usr/local/bin/vhs

          gh release download --repo tsl0922/ttyd \
            --pattern 'ttyd.x86_64' \
            --output /tmp/ttyd --clobber
          sudo install -m 0755 /tmp/ttyd /usr/local/bin/ttyd

      - name: Install ffmpeg
        if: steps.check.outputs.needs_render == 'true' && hashFiles(format('{0}/.vhs/*.tape', matrix.lib)) != ''
        # Direct apt install instead of awalsh128/cache-apt-pkgs-action.
        # That action restores cached .deb file contents but doesn't
        # re-run apt's post-install scripts on cache hit — libblas's
        # update-alternatives entry never gets recreated, and ffmpeg
        # crashes at runtime with
        #   libblas.so.3: cannot open shared object file
        # Even with execute_install_scripts: true the dpkg --configure
        # call isn't sufficient to recreate update-alternatives symlinks
        # (see run 25825814166, candy-shine vs candy-kit). The runner
        # image has apt cache pre-indexed so a direct install is ~15s,
        # FASTER than the ~90s cache-apt-pkgs cache-miss path was, and
        # always runs the real post-install scripts.
        run: |
          set -euo pipefail
          sudo apt-get install -y --no-install-recommends ffmpeg \
            || (sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg)

      - name: Verify tools
        if: steps.check.outputs.needs_render == 'true' && hashFiles(format('{0}/.vhs/*.tape', matrix.lib)) != ''
        # set -o pipefail so `ffmpeg -version | head -1` propagates an
        # ffmpeg shared-library load failure (exit 127) instead of being
        # masked by head's success. We had a silent libblas.so.3
        # cannot-open-shared-object regression slip through here.
        run: |
          set -euo pipefail
          vhs --version
          ttyd --version
          ffmpeg -version | head -1

      - name: Render every .tape in ${{ matrix.lib }}/.vhs/
        if: steps.check.outputs.needs_render == 'true' && hashFiles(format('{0}/.vhs/*.tape', matrix.lib)) != ''
        working-directory: ${{ matrix.lib }}
        run: |
          set -euo pipefail
          for tape in .vhs/*.tape; do
            echo "▶ rendering $tape"
            vhs "$tape"
          done
          echo "rendered files in $(pwd):"
          find .vhs -type f | sort

      - name: Upload rendered GIFs as artifact
        if: steps.check.outputs.needs_render == 'true' && hashFiles(format('{0}/.vhs/*.tape', matrix.lib)) != ''
        uses: actions/upload-artifact@v5
        with:
          name: gifs-${{ matrix.lib }}
          path: ${{ matrix.lib }}/.vhs/*.gif
          if-no-files-found: warn
          # The .vhs/ directory is dot-prefixed; upload-artifact@v4
          # ignores hidden paths by default. Override to include them.
          include-hidden-files: true
          retention-days: 1

  # Single aggregate-commit job. Runs once after every render finishes.
  # Replaces the per-job push that race-collided when 16 parallel jobs
  # each tried to push to master at the same time.
  commit:
    needs: render
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          # Fetch full history so we can reliably detect GIF deltas
          # vs. what was already committed at the trigger SHA.
          fetch-depth: 0

      - name: Download all GIF artifacts
        uses: actions/download-artifact@v5
        with:
          path: /tmp/gifs
          pattern: gifs-*

      - name: Move GIFs into their lib's .vhs/ dir
        run: |
          set -euo pipefail
          shopt -s nullglob
          for d in /tmp/gifs/gifs-*; do
            lib="${d#/tmp/gifs/gifs-}"
            echo "Processing artifact dir: $d -> lib: $lib"
            mkdir -p "$lib/.vhs"
            echo "Contents of $d:"
            ls -la "$d/" || echo "(empty or missing)"
            if [ "$(ls -1 "$d"/*.gif 2>/dev/null | wc -l)" -eq 0 ]; then
              echo "WARNING: No .gif files found in $d/"
              continue
            fi
            cp -v "$d"/*.gif "$lib/.vhs/"
            echo "Copied $(ls -1 "$lib/.vhs/"/*.gif 2>/dev/null | wc -l) GIF(s) to $lib/.vhs/"
          done

      - name: Commit + push
        run: |
          set -euo pipefail
          git config user.name  'Joe Huss'
          git config user.email 'detain@interserver.net'

          # Count GIF files present in artifacts
          artifact_count=$(find /tmp/gifs -name "*.gif" -type f | wc -l)
          echo "Found $artifact_count GIF file(s) in artifacts"

          if [ "$artifact_count" -eq 0 ]; then
            echo "No GIF artifacts found — skipping commit"
            exit 0
          fi

          # Stage all GIFs from the rendered artifacts
          git add */.vhs/*.gif

          # Count staged files
          staged_count=$(git diff --cached --name-only -- "*/.vhs/*.gif" | wc -l)
          echo "Staged $staged_count GIF file(s)"

          if [ "$staged_count" -eq 0 ]; then
            echo "no GIF files staged — skipping commit"
            exit 0
          fi

          # Check if there are actual differences vs HEAD (the trigger commit)
          # Use --exit-code so we get a clear success/failure
          if git diff --cached --quiet --exit-code; then
            # No diff means new GIFs are identical to HEAD — nothing to commit
            echo "GIFs identical to HEAD — skipping commit"
            git reset HEAD -- "*/.vhs/*.gif" 2>/dev/null || true
            exit 0
          fi

          echo "GIFs differ from HEAD — committing"
          git commit -m "vhs: regenerate demo GIFs"
          # Single push — no concurrent jobs means no race. If something
          # else pushed during this run, rebase + retry once.
          git push || (git pull --rebase origin master && git push)
