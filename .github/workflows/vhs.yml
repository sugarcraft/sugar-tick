name: VHS demos

on:
  push:
    branches: [master]
    paths:
      - '*/.vhs/*.tape'
      - '*/examples/**'
      - '*/src/**'
      - '*/bin/**'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        lib:
          - candy-core
          - candy-sprinkles
          - sugar-bits
          - sugar-charts
          - sugar-prompt
          - candy-shell
          - candy-shine
          - candy-kit
          - candy-freeze
          - sugar-glow
          - sugar-spark
          - sugar-wishlist
          - candy-mold
          - candy-tetris
          - super-candy
          - sugar-crush
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pcntl
          tools: composer:v2
          coverage: none

      - name: Install lib deps
        working-directory: ${{ matrix.lib }}
        run: composer install --prefer-dist --no-progress

      # vhs-action@v2's bundled ffmpeg install has been failing in
      # CI ("Failed to install ffmpeg" — every job, every run). Skip
      # the action and install vhs + ttyd + ffmpeg directly: ffmpeg
      # via apt, vhs and ttyd from GitHub releases.
      - name: Install vhs + ttyd + ffmpeg
        if: hashFiles(format('{0}/.vhs/*.tape', matrix.lib)) != ''
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

          # vhs release assets embed the version in the filename
          # (vhs_<version>_Linux_x86_64.tar.gz), so resolve latest first.
          vhs_url=$(curl -sSL "https://api.github.com/repos/charmbracelet/vhs/releases/latest" \
            | jq -r '.assets[] | select(.name | endswith("Linux_x86_64.tar.gz")) | .browser_download_url' \
            | head -1)
          echo "vhs tarball: $vhs_url"
          curl -sSL "$vhs_url" \
            | sudo tar -xz -C /usr/local/bin --strip-components=1 --wildcards '*/vhs'
          sudo chmod +x /usr/local/bin/vhs

          curl -sSL -o /tmp/ttyd "https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64"
          sudo install -m 0755 /tmp/ttyd /usr/local/bin/ttyd

          vhs --version
          ttyd --version
          ffmpeg -version | head -1

      - name: Render every .tape in ${{ matrix.lib }}/.vhs/
        if: hashFiles(format('{0}/.vhs/*.tape', matrix.lib)) != ''
        working-directory: ${{ matrix.lib }}
        run: |
          set -euo pipefail
          for tape in .vhs/*.tape; do
            echo "▶ rendering $tape"
            vhs "$tape"
          done

      - name: Commit rendered GIFs
        if: hashFiles(format('{0}/.vhs/*.gif', matrix.lib)) != ''
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ${{ matrix.lib }}/.vhs/*.gif
          if ! git diff --cached --quiet; then
            git commit -m "vhs: regenerate ${{ matrix.lib }} demo GIFs"
            git push
          fi
