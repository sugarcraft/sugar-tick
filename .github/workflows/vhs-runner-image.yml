name: VHS runner image

# Build + publish ghcr.io/<owner>/vhs-runner. Used by vhs.yml so render
# jobs don't need to hit GitHub release APIs (vhs / ttyd / ffmpeg) on
# every push. Weekly rebuild picks up upstream releases without manual
# work.
#
# Cost: 2 authenticated API calls per build (gh release view × 2).
# Weekly schedule = ~104 API calls/year total, vs. up to 94 per push
# under the old in-line download flow.

on:
  schedule:
    # Monday 06:00 UTC — early-week rebuild so any new vhs/ttyd
    # release lands before the bulk of weekday demo work.
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'scripts/vhs-runner/Dockerfile'
      - '.github/workflows/vhs-runner-image.yml'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/vhs-runner

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve vhs + ttyd versions
        id: vers
        env:
          # Authenticated calls get 5000/hr instead of the anonymous
          # 60/hr ceiling. Only 2 calls per run regardless.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          vhs=$(gh release view --repo charmbracelet/vhs  --json tagName -q .tagName)
          ttyd=$(gh release view --repo tsl0922/ttyd      --json tagName -q .tagName)
          echo "Resolved vhs=$vhs ttyd=$ttyd"
          echo "vhs=$vhs"   >> "$GITHUB_OUTPUT"
          echo "ttyd=$ttyd" >> "$GITHUB_OUTPUT"
          # Strip leading 'v' from ttyd if present so the image tag
          # matches the asset filename convention.
          echo "tag=vhs-${vhs}-ttyd-${ttyd}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: scripts/vhs-runner
          push: true
          build-args: |
            VHS_VERSION=${{ steps.vers.outputs.vhs }}
            TTYD_VERSION=${{ steps.vers.outputs.ttyd }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vers.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          # GHA build cache. type=gha uses the Actions cache backend,
          # mode=max stores every layer so cron rebuilds are nearly
          # instant when only the version pins changed.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Summary
        run: |
          {
            echo "## VHS runner image built"
            echo ""
            echo "- vhs: \`${{ steps.vers.outputs.vhs }}\`"
            echo "- ttyd: \`${{ steps.vers.outputs.ttyd }}\`"
            echo "- Image: \`${{ env.IMAGE_NAME }}:${{ steps.vers.outputs.tag }}\`"
            echo "- Also tagged: \`${{ env.IMAGE_NAME }}:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
