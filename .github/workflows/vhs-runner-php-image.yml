name: VHS runner PHP image

on:
  push:
    branches: [master]
    paths:
      - 'scripts/Dockerfile.vhs-runner'
      - '.github/workflows/vhs-runner-php-image.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  IMAGE_NAME: ghcr.io/detain/sugarcraft-vhs-runner-php

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/Dockerfile.vhs-runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## VHS runner PHP image built"
            echo ""
            echo "- Image: \`${{ env.IMAGE_NAME }}:latest\`"
            echo "- SHA: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
