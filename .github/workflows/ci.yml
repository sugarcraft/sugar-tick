name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  # Belt-and-suspenders: every action below is already pinned to its
  # Node-24-native major (checkout@v5, cache@v5, setup-php@v2 ≥2.37),
  # but this flag keeps any transitively-loaded JavaScript action that
  # still defaults to Node 20 from generating deprecation warnings.
  # Requires Actions Runner ≥ 2.327.1 (already the default on
  # ubuntu-latest as of 2025-Q4).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

  # Single source of truth for the PHP extension union — referenced by
  # both the cache-extensions step (for cache-key computation) and the
  # setup-php step (for the actual install). See the test job for why
  # we install everything on every cell.
  PHP_EXTENSIONS: mbstring, intl, json, pcntl, sqlite3, pdo_sqlite, ssh2, gd, curl, openssl, ffi

jobs:
  # Compute every job's matrix by diffing the change-set and walking the
  # reverse-dep graph from each lib's composer.json (see scripts/affected-libs.php).
  # Only libs whose own files changed — plus the transitive closure of libs that
  # require them — get tested. A `candy-core` change fans out to ~40 libs; a
  # `sugar-crush` change scopes down to one cell.
  #
  # Force-all triggers (script-side): root composer.json/composer.lock change,
  # the workflow itself changing, or the script changing. workflow_dispatch and
  # unresolvable git ranges (shallow clones, first commit on branch) also
  # force-all from the workflow side.
  #
  # Empty matrix arrays are intentional: GitHub spawns zero cells and emits zero
  # check_runs — which avoids the Actions quirk where a job-level `if:` on a
  # matrix job emits one "skipped" placeholder check_run per declared cell with
  # the literal `${{ matrix.* }}` template text in its name (leaking into the
  # Teams notification feed as e.g. "Coverage · ${{ matrix.lib }} Check skipped").
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      test_matrix: ${{ steps.compute.outputs.test_matrix }}
      coverage_libs: ${{ steps.compute.outputs.coverage_libs }}
      phpstan_matrix: ${{ steps.compute.outputs.phpstan_matrix }}
      windows_matrix: ${{ steps.compute.outputs.windows_matrix }}
      macos_matrix: ${{ steps.compute.outputs.macos_matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Need both endpoints of the diff. For push events GitHub sets
          # `event.before`; for PRs the base ref needs to be fetched too.
          # fetch-depth: 0 is the simple, robust choice — the repo is small.
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - id: compute
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
          IS_MASTER_PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        run: |
          set -euo pipefail
          ZERO="0000000000000000000000000000000000000000"
          MODE="--all"
          case "$EVENT_NAME" in
            workflow_dispatch)
              MODE="--all"
              ;;
            pull_request)
              if [ -n "${BASE_SHA:-}" ]; then
                git fetch --no-tags --depth=200 origin "$BASE_SHA" 2>/dev/null || true
                MODE="--range ${BASE_SHA}..${HEAD_SHA}"
              fi
              ;;
            push)
              if [ -n "${BEFORE_SHA:-}" ] && [ "$BEFORE_SHA" != "$ZERO" ]; then
                MODE="--range ${BEFORE_SHA}..${HEAD_SHA}"
              fi
              ;;
          esac

          echo "affected-libs mode: $MODE" >&2
          # shellcheck disable=SC2086 # intentional word-split for --range
          JSON=$(php scripts/affected-libs.php $MODE)
          echo "$JSON" | jq -r '. | "force_all=\(.force_all) changed=\(.changed_libs | length) affected=\(.affected | length)"' >&2

          # Coverage only runs on push-to-master (cost gate kept).
          if [ "$IS_MASTER_PUSH" != "true" ]; then
            JSON=$(echo "$JSON" | jq '.coverage_libs = []')
          fi

          {
            echo "test_matrix=$(echo "$JSON" | jq -c '.test_matrix')"
            echo "coverage_libs=$(echo "$JSON" | jq -c '.coverage_libs')"
            echo "phpstan_matrix=$(echo "$JSON" | jq -c '.phpstan_matrix')"
            echo "windows_matrix=$(echo "$JSON" | jq -c '.windows_matrix')"
            echo "macos_matrix=$(echo "$JSON" | jq -c '.macos_matrix')"
          } >> "$GITHUB_OUTPUT"

  # Verify every "@dev" intra-monorepo dependency has a path-repo entry
  # so composer install resolves via symlink, never the upstream remote.
  # Catches the CLAUDE.md gotcha: "new transitive @dev deps need their
  # path-repo added to every consuming lib's repositories[]". Cheap —
  # one PHP run, no composer install needed.
  path-repo-check:
    name: 'Path-repo closure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Verify path-repo closure
        run: php tools/check-path-repos.php

  # Unified test matrix — every (php, lib) tuple comes from build-matrix, which
  # auto-discovers libs from filesystem (any dir with composer.json + phpunit.xml)
  # and scopes to libs affected by the change-set via the reverse-dep graph.
  # Per-PHP-version filtering happens inside scripts/affected-libs.php.
  test:
    name: 'Test PHP ${{ matrix.php }} · ${{ matrix.lib }}'
    runs-on: ubuntu-latest
    needs: [build-matrix]
    # All pushes to the same branch share ONE concurrency group per matrix cell.
    # When a new commit arrives, any in-progress jobs from the previous commit
    # are cancelled immediately — no waiting for the old run to finish.
    concurrency:
      group: ci-test-${{ github.ref }}-${{ matrix.lib }}-${{ matrix.php }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.build-matrix.outputs.test_matrix) }}

    steps:
      - uses: actions/checkout@v5

      # Cache the *built* PHP extension binaries (ssh2 / gd / curl / sqlite3
      # / pdo_sqlite — the ones that aren't bundled with the runner image).
      # Without this, every matrix cell rebuilds them from PECL, adding
      # 5–10s × 164 cells = ~20 minutes of total CPU per push.
      - name: Compute PHP-extension cache key
        id: ext-cache
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.PHP_EXTENSIONS }}
          # Bump key suffix when adding/removing extensions or when a runner
          # image upgrade invalidates ABI compatibility.
          key: php-ext-v3

      - name: Restore PHP extensions
        uses: actions/cache@v5
        with:
          path: ${{ steps.ext-cache.outputs.dir }}
          key: ${{ steps.ext-cache.outputs.key }}
          restore-keys: ${{ steps.ext-cache.outputs.key }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.PHP_EXTENSIONS }}
          tools: composer:v2
          coverage: none

      - name: Get composer cache dir
        id: cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer downloads
        uses: actions/cache@v5
        with:
          path: ${{ steps.cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            composer-${{ matrix.php }}-

      # Cache the per-lib vendor/ directory keyed on its composer.json. When
      # only one lib changes, every other lib's vendor cache hits and
      # composer install becomes a ~100ms validation pass. The fallback
      # restore-keys lets a sibling-lib's cache seed dependency resolution
      # before composer fills in the rest from the warm composer cache.
      - name: Cache vendor/
        uses: actions/cache@v5
        with:
          path: ${{ matrix.lib }}/vendor
          key: vendor-v2-${{ matrix.php }}-${{ matrix.lib }}-${{ hashFiles(format('{0}/composer.json', matrix.lib)) }}
          restore-keys: |
            vendor-${{ matrix.php }}-${{ matrix.lib }}-

      - name: Install dependencies
        run: cd ${{ matrix.lib }} && composer install --prefer-dist --no-progress -n

      - name: Run tests
        run: php ${{ matrix.lib }}/vendor/bin/phpunit -c ${{ matrix.lib }}/phpunit.xml --colors=never

  # Windows test job — verifies Windows-native TTY paths (FFI/kernel32 paths
  # in candy-core) pass on windows-latest. Uses a small matrix of the most
  # TTY-sensitive libs to keep wall-clock time reasonable.
  windows-test:
    name: 'Windows · PHP ${{ matrix.php }} · ${{ matrix.lib }}'
    runs-on: windows-latest
    needs: [build-matrix]
    concurrency:
      group: ci-windows-${{ github.ref }}-${{ matrix.lib }}-${{ matrix.php }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.build-matrix.outputs.windows_matrix) }}
    steps:
      - uses: actions/checkout@v5

      # PHP on Windows comes with FFI enabled by default in PHP 8.3+.
      # We still declare mbstring / intl / json / pcntl explicitly so that
      # the action installs them if they are missing from the runner image.
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, json, pcntl, ffi
          tools: composer:v2
          coverage: none
          ini-values: ffi.enable=true

      # Composer cache disabled on Windows: path encoding issues in GH Actions
      # runner make the cache more trouble than it's worth.  Vendor/ caching
      # (below) handles the significant per-lib dependency layer.

      - name: Cache vendor/
        uses: actions/cache@v5
        with:
          path: ${{ matrix.lib }}/vendor
          key: vendor-win-v2-${{ matrix.php }}-${{ matrix.lib }}-${{ hashFiles(format('{0}/composer.json', matrix.lib)) }}
          restore-keys: |
            vendor-win-${{ matrix.php }}-${{ matrix.lib }}-

      - name: Install dependencies
        run: cd ${{ matrix.lib }} && composer install --prefer-dist --no-progress -n --ignore-platform-req=ext-pcntl --ignore-platform-req=ext-shmop

      # candy-core: run TTY subsystem tests (where WindowsBackend / kernel32 FFI
      # lives).  Downstream libs (sugar-prompt, sugar-bits, candy-shell,
      # candy-shine): run full suite — any failures there are pre-existing and
      # unrelated to the x/windows changes.
      - name: Run tests
        run: |
          if (Test-Path ${{ matrix.lib }}\tests\Util\Tty) {
            php ${{ matrix.lib }}\vendor\bin\phpunit -c ${{ matrix.lib }}\phpunit.xml ${{ matrix.lib }}\tests\Util\Tty\ --colors=never
          } else {
            php ${{ matrix.lib }}\vendor\bin\phpunit -c ${{ matrix.lib }}\phpunit.xml --colors=never
          }

  # macOS test job — verifies POSIX PTY paths (candy-pty's libc FFI:
  # posix_openpt / grantpt / unlockpt / ptsname_r / ioctl + the macOS
  # TIOCSWINSZ / TIOCGWINSZ constants that diverge from Linux) work
  # on Darwin. Scoped to candy-pty only — other libs would catch
  # macOS-specific regressions on demand if/when issues surface.
  macos-test:
    name: 'macOS · PHP ${{ matrix.php }} · ${{ matrix.lib }}'
    runs-on: macos-26-intel
    timeout-minutes: 30
    needs: [build-matrix]
    concurrency:
      group: ci-macos-${{ github.ref }}-${{ matrix.lib }}-${{ matrix.php }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.build-matrix.outputs.macos_matrix) }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, json, pcntl, ffi, :xdebug
          tools: composer:v2
          coverage: none
          ini-values: ffi.enable=true

      - name: Cache vendor/
        uses: actions/cache@v5
        with:
          path: ${{ matrix.lib }}/vendor
          key: vendor-mac-v2-${{ matrix.php }}-${{ matrix.lib }}-${{ hashFiles(format('{0}/composer.json', matrix.lib)) }}
          restore-keys: |
            vendor-mac-${{ matrix.php }}-${{ matrix.lib }}-

      - name: Install dependencies
        run: cd ${{ matrix.lib }} && composer install --prefer-dist --no-progress -n

      - name: List Modules
        run: php -m

      - name: Run tests
        run: php ${{ matrix.lib }}/vendor/bin/phpunit -c ${{ matrix.lib }}/phpunit.xml --colors=never

  # Coverage report — runs once on PHP 8.3 + pcov for every lib in the
  # matrix, uploads a per-lib clover XML to codecov with the lib slug
  # as a flag. Codecov uses the flag to surface a separate badge per
  # package on the README.
  coverage:
    name: 'Coverage · ${{ matrix.lib }}'
    runs-on: ubuntu-latest
    # Depend ONLY on build-matrix (the real matrix-data dependency). We used
    # to also `needs: [test]` so coverage waited for tests, but that had a
    # subtle side-effect: when any test matrix cell failed (fail-fast: false
    # means cells DO fail individually) GitHub marked the whole `test` job
    # failed → this job was skipped via needs-failure BEFORE its matrix could
    # expand → GitHub emitted one "skipped" placeholder check_run per
    # declared cell using the literal `name:` template, leaking the
    # unexpanded `${{ matrix.lib }}` text into the Teams notification feed.
    # Dynamic matrix only avoids the placeholder when the matrix actually
    # gets evaluated; a needs-failure skip happens earlier. Running in
    # parallel with `test` costs a few CI minutes when tests fail, but
    # eliminates the placeholder noise.
    needs: [build-matrix]
    concurrency:
      group: ci-coverage-${{ github.ref }}-${{ matrix.lib }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        lib: ${{ fromJSON(needs.build-matrix.outputs.coverage_libs) }}
    steps:
      - uses: actions/checkout@v5

      # Same extension-cache pattern as the test job (see comment there).
      - name: Compute PHP-extension cache key
        id: ext-cache
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: '8.3'
          extensions: ${{ env.PHP_EXTENSIONS }}
          key: php-ext-cov-v3

      - name: Restore PHP extensions
        uses: actions/cache@v5
        with:
          path: ${{ steps.ext-cache.outputs.dir }}
          key: ${{ steps.ext-cache.outputs.key }}
          restore-keys: ${{ steps.ext-cache.outputs.key }}

      - name: Setup PHP (with pcov)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          # Same extension union as the test job — keeps test- and
          # coverage-job environments byte-identical.
          extensions: ${{ env.PHP_EXTENSIONS }}
          tools: composer:v2
          coverage: pcov

      - name: Cache composer downloads
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: composer-cov-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            composer-cov-

      - name: Cache vendor/
        uses: actions/cache@v5
        with:
          path: ${{ matrix.lib }}/vendor
          key: vendor-cov-v2-${{ matrix.lib }}-${{ hashFiles(format('{0}/composer.json', matrix.lib)) }}
          restore-keys: |
            vendor-cov-${{ matrix.lib }}-

      # Cache key version bump — increment when intra-monorepo @dev
      # deps shift in a lib's composer.json so stale lockfiles cached
      # under the old key don't shadow committed lock updates. v2 (PTY
      # plan P0–P5): candy-core, candy-shell, candy-pty gained new
      # transitive @dev edges that the v1 cache pre-dates.
      - name: Cache composer.lock
        uses: actions/cache@v5
        with:
          path: ${{ matrix.lib }}/composer.lock
          key: lock-cov-v2-${{ matrix.lib }}-${{ hashFiles(format('{0}/composer.json', matrix.lib)) }}
          restore-keys: |
            lock-cov-v2-${{ matrix.lib }}-

      - name: Install dependencies
        run: |
          set -e
          for i in 1 2 3; do
            cd ${{ matrix.lib }} && composer install --prefer-dist --no-progress -n && break
            echo "Composer install failed, retry $i/3 in 10s..."
            sleep 10
          done

      - name: Run tests with coverage
        run: php ${{ matrix.lib }}/vendor/bin/phpunit -c ${{ matrix.lib }}/phpunit.xml --colors=never --coverage-clover=${{ matrix.lib }}/coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          # Explicit slug + a single named file → don't accidentally
          # walk the whole tree looking for other coverage reports.
          slug: detain/sugarcraft
          files: ${{ matrix.lib }}/coverage.xml
          disable_search: true
          flags: ${{ matrix.lib }}
          name: ${{ matrix.lib }}
          # Token MUST be set as a secret on detain/sugarcraft (repo or
          # environment scope) — GitHub org secrets only flow into repos
          # *inside* that org, so a sugarcraft-org-level secret won't be
          # visible to this monorepo. For a public repo the action falls
          # back to tokenless OIDC upload when the secret is empty, so
          # this still works during initial bootstrap.
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  # PHPStan static analysis — runs on all PHP versions after tests pass,
  # verifying type safety and catching type errors before they reach CI.
  # Only runs on libs that have a phpstan.neon file.
  phpstan:
    name: 'PHPStan ${{ matrix.php }} · ${{ matrix.lib }}'
    runs-on: ubuntu-latest
    # Depend ONLY on build-matrix — see the long comment on the `coverage`
    # job above for why dropping `needs: [test]` is what actually eliminates
    # the unexpanded `${{ matrix.* }}` placeholder check_runs.
    needs: [build-matrix]
    concurrency:
      group: ci-phpstan-${{ github.ref }}-${{ matrix.lib }}-${{ matrix.php }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.build-matrix.outputs.phpstan_matrix) }}
    steps:
      - uses: actions/checkout@v5

      - name: Compute PHP-extension cache key
        id: ext-cache
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.PHP_EXTENSIONS }}
          key: php-ext-stan-v3

      - name: Restore PHP extensions
        uses: actions/cache@v5
        with:
          path: ${{ steps.ext-cache.outputs.dir }}
          key: ${{ steps.ext-cache.outputs.key }}
          restore-keys: ${{ steps.ext-cache.outputs.key }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.PHP_EXTENSIONS }}
          tools: composer:v2
          coverage: none

      - name: Cache composer downloads
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: composer-stan-${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            composer-stan-${{ matrix.php }}-
            composer-stan-

      - name: Cache vendor/
        uses: actions/cache@v5
        with:
          path: ${{ matrix.lib }}/vendor
          key: vendor-stan-v2-${{ matrix.php }}-${{ matrix.lib }}-${{ hashFiles(format('{0}/composer.json', matrix.lib)) }}
          restore-keys: |
            vendor-stan-${{ matrix.php }}-${{ matrix.lib }}-
            vendor-stan-${{ matrix.lib }}-

      - name: Install dependencies
        run: cd ${{ matrix.lib }} && composer install --prefer-dist --no-progress -n

      - name: Run PHPStan
        run: php ${{ matrix.lib }}/vendor/bin/phpstan analyse --level=5 --no-progress -c ${{ matrix.lib }}/phpstan.neon
