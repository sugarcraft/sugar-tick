name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  # Belt-and-suspenders: every action below is already pinned to its
  # Node-24-native major (checkout@v5, cache@v5, setup-php@v2 ≥2.37),
  # but this flag keeps any transitively-loaded JavaScript action that
  # still defaults to Node 20 from generating deprecation warnings.
  # Requires Actions Runner ≥ 2.327.1 (already the default on
  # ubuntu-latest as of 2025-Q4).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: 'Test PHP ${{ matrix.php }} · ${{ matrix.lib }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        lib:
          - candy-core
          - candy-sprinkles
          - honey-bounce
          - candy-zone
          - sugar-bits
          - sugar-charts
          - sugar-prompt
          - candy-shell
          - candy-shine
          - candy-kit
          - candy-freeze
          - sugar-glow
          - sugar-spark
          - candy-wish
          - sugar-wishlist
          - candy-metrics
          - candy-mold
          - candy-tetris
          - super-candy
          - sugar-crush
          - sugar-stash
          - candy-query
          - sugar-tick
          - candy-mines
          - candy-flip
          - honey-flap

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, pcntl
          tools: composer:v2
          coverage: none

      - name: Get composer cache dir
        id: cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer downloads
        uses: actions/cache@v5
        with:
          path: ${{ steps.cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            composer-${{ matrix.php }}-

      - name: Install dependencies
        working-directory: ${{ matrix.lib }}
        run: composer install --prefer-dist --no-progress

      - name: Run tests
        working-directory: ${{ matrix.lib }}
        run: vendor/bin/phpunit --colors=never

  # Coverage report — runs once on PHP 8.3 + pcov for every lib in the
  # matrix, uploads a per-lib clover XML to codecov with the lib slug
  # as a flag. Codecov uses the flag to surface a separate badge per
  # package on the README.
  coverage:
    name: 'Coverage · ${{ matrix.lib }}'
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    strategy:
      fail-fast: false
      matrix:
        lib:
          - candy-core
          - candy-sprinkles
          - honey-bounce
          - candy-zone
          - sugar-bits
          - sugar-charts
          - sugar-prompt
          - candy-shell
          - candy-shine
          - candy-kit
          - candy-freeze
          - sugar-glow
          - sugar-spark
          - candy-wish
          - sugar-wishlist
          - candy-metrics
          - candy-mold
          - candy-tetris
          - super-candy
          - sugar-crush
          - sugar-stash
          - candy-query
          - sugar-tick
          - candy-mines
          - candy-flip
          - honey-flap
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP (with pcov)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pcntl, pdo_sqlite, gd
          tools: composer:v2
          coverage: pcov

      - name: Cache composer downloads
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: composer-cov-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            composer-cov-

      - name: Install dependencies
        working-directory: ${{ matrix.lib }}
        run: composer install --prefer-dist --no-progress

      - name: Run tests with coverage
        working-directory: ${{ matrix.lib }}
        run: vendor/bin/phpunit --colors=never --coverage-clover=coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ${{ matrix.lib }}/coverage.xml
          flags: ${{ matrix.lib }}
          name: ${{ matrix.lib }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
