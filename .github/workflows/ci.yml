name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  # Opt every JavaScript action into the Node 24 runtime — silences the
  # "Node 20 actions are deprecated" warnings on the GitHub Actions runner.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: 'Test PHP ${{ matrix.php }} · ${{ matrix.lib }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        lib:
          - candy-core
          - candy-sprinkles
          - honey-bounce
          - candy-zone
          - sugar-bits
          - sugar-charts
          - sugar-prompt
          - candy-shell
          - candy-shine
          - candy-kit
          - candy-freeze
          - sugar-glow
          - sugar-spark
          - candy-wish
          - sugar-wishlist
          - candy-metrics
          - candy-mold
          - candy-tetris
          - super-candy
          - sugar-crush

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, pcntl
          tools: composer:v2
          coverage: none

      - name: Get composer cache dir
        id: cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer downloads
        uses: actions/cache@v4
        with:
          path: ${{ steps.cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            composer-${{ matrix.php }}-

      - name: Install dependencies
        working-directory: ${{ matrix.lib }}
        run: composer install --prefer-dist --no-progress

      - name: Run tests
        working-directory: ${{ matrix.lib }}
        run: vendor/bin/phpunit --colors=never
