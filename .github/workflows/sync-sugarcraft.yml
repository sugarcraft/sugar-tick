name: Sync to sugarcraft org

# Pushes changed lib/app subdirs to their sibling sugarcraft/<lib> repo,
# and pushes docs/ to sugarcraft/sugarcraft.github.io. Treats this
# monorepo as the source of truth.
#
# Only libs whose source/tests/config changed (or whose deps changed)
# are pushed — same affected-libs logic as ci.yml. Monorepo-wide changes
# (workflow files, root composer) push everything.
#
# Auth: SUGARCRAFT_SYNC_TOKEN secret — a PAT with `repo` scope on
# the sugarcraft org. Without it, all push steps will 403.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: sync-sugarcraft
  cancel-in-progress: false

jobs:
  sync-libs:
    name: Subtree-push affected libs to sugarcraft/<lib>
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # git subtree split needs full history

      - name: Compute affected libs
        id: affected
        run: |
          set -euo pipefail
          # Use the same affected-libs logic as ci.yml
          # --range HEAD~1..HEAD gives us files changed in this push
          # The script computes changed libs + transitive dependents
          result=$(php scripts/affected-libs.php --range HEAD~1..HEAD 2>&1)
          affected=$(echo "$result" | python3 -c "import json,sys; d=json.load(sys.stdin); print('\n'.join(d['affected']))" 2>/dev/null || true)
          force_all=$(echo "$result" | python3 -c "import json,sys; d=json.load(sys.stdin); print('yes' if d['force_all'] else 'no')" 2>/dev/null || echo "yes")
          echo "force_all=$force_all"
          echo "affected_libs=$affected"
          echo "affected_libs=$affected" >> "$GITHUB_OUTPUT"
          echo "force_all=$force_all" >> "$GITHUB_OUTPUT"

      - name: Configure git identity + drop checkout's auth header
        run: |
          git config user.name  'Joe Huss'
          git config user.email 'detain@interserver.net'
          git config --local --unset-all http.https://github.com/.extraheader || true

      - name: Subtree-split + force-push each affected lib
        env:
          TOKEN: ${{ secrets.SUGARCRAFT_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          force_all="${{ fromJSON(steps.affected.outputs.force_all) }}"
          libs_str="${{ steps.affected.outputs.affected_libs }}"

          if [ "$force_all" = "yes" ]; then
            # Monorepo-wide change: push all libs
            echo "force_all=yes — pushing all libs"
            mapfile -t libs < <(php scripts/affected-libs.php --all 2>/dev/null | python3 -c "import json,sys; print('\n'.join(json.load(sys.stdin)['all_libs']))")
          else
            # Changed-only: push only affected libs
            echo "Pushing affected libs:"
            echo "$libs_str"
            mapfile -t libs < <(echo "$libs_str" | grep -v '^$')
          fi

          for lib in "${libs[@]}"; do
            [ -d "$lib" ] || { echo "skip $lib (no dir)"; continue; }
            br="sync-$lib"
            git branch -D "$br" 2>/dev/null || true
            git subtree split --prefix="$lib" --branch="$br" --quiet
            git push --force \
              "https://x-access-token:$TOKEN@github.com/sugarcraft/$lib.git" \
              "$br:master"
            git branch -D "$br" >/dev/null
            echo "✓ synced $lib"
          done
          echo "Done — ${#libs[@]} libs pushed"

  sync-site:
    name: Push docs/ to sugarcraft/sugarcraft.github.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Mirror docs/ → sugarcraft.github.io master
        env:
          TOKEN: ${{ secrets.SUGARCRAFT_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          git clone --quiet \
            "https://x-access-token:$TOKEN@github.com/sugarcraft/sugarcraft.github.io.git" \
            "$tmp/site"
          rsync -a --delete --exclude=.git ./docs/ "$tmp/site/"
          cd "$tmp/site"
          git config user.name  'Joe Huss'
          git config user.email 'detain@interserver.net'
          git add -A
          if git diff --cached --quiet; then
            echo "site already in sync"
            exit 0
          fi
          git commit --quiet -m "Sync from monorepo @ ${GITHUB_SHA:0:7}"
          git push --quiet origin master
          echo "✓ pushed site update"
