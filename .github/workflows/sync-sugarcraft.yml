name: Sync to sugarcraft org

# Pushes changed lib/app subdirs to their sibling sugarcraft/<lib> repo,
# and pushes docs/ to sugarcraft/sugarcraft.github.io. Treats this
# monorepo as the source of truth.
#
# Only libs whose source/tests/config changed (or whose deps changed)
# are pushed — same affected-libs logic as ci.yml. Monorepo-wide changes
# (workflow files, root composer) push everything.
#
# Auth: SUGARCRAFT_SYNC_TOKEN secret — a PAT with `repo` scope on
# the sugarcraft org. Without it, all push steps will 403.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: sync-sugarcraft
  cancel-in-progress: false

jobs:
  sync-libs:
    name: Split-push affected libs to sugarcraft/<lib>
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # splitsh-lite needs full history to compute the subtree split

      - name: Compute affected libs
        id: affected
        run: |
          set -euo pipefail
          # Use the same affected-libs logic as ci.yml
          # --range HEAD~1..HEAD gives us files changed in this push
          # The script computes changed libs + transitive dependents
          result=$(php scripts/affected-libs.php --range HEAD~1..HEAD 2>&1)
          affected=$(echo "$result" | python3 -c "import json,sys; d=json.load(sys.stdin); print('\n'.join(d['affected']))" 2>/dev/null || true)
          force_all=$(echo "$result" | python3 -c "import json,sys; d=json.load(sys.stdin); print('yes' if d['force_all'] else 'no')" 2>/dev/null || echo "yes")
          echo "force_all=$force_all"
          echo "affected_libs=$affected"
          echo "affected_libs=$affected" >> "$GITHUB_OUTPUT"
          echo "force_all=$force_all" >> "$GITHUB_OUTPUT"

      - name: Configure git identity + drop checkout's auth header
        run: |
          git config user.name  'Joe Huss'
          git config user.email 'detain@interserver.net'
          git config --local --unset-all http.https://github.com/.extraheader || true

      # splitsh-lite emits the IDENTICAL split SHA as `git subtree split`, so the
      # pushed history is byte-for-byte the same — no divergence for existing
      # sugarcraft/* clones. Within a single run it keeps an in-process commit
      # cache (.git/splitsh.db) shared across prefixes, so the first lib pays the
      # full history walk (~25s) and the remaining libs are near-instant — all 56
      # libs split + push cold in ~70s.
      #
      # We deliberately do NOT persist .git/splitsh.db across runs via
      # actions/cache: splitsh-lite opens the BoltDB cache read-write, and a
      # cache-restored db is not reliably writable on the runner, which makes
      # splitsh-lite abort instantly with "open .git/splitsh.db: permission
      # denied". The ~30s a warm cache would save is not worth that fragility.
      - name: Install splitsh-lite
        run: |
          set -euo pipefail
          url="https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64.tar.gz"
          expected="ec46c5a409422bf55b26f7de1faab67c2320362934947f984872b3aedc4a9d99"
          curl -fsSL "$url" -o /tmp/splitsh.tar.gz
          tar -xzf /tmp/splitsh.tar.gz -C /tmp ./splitsh-lite
          echo "$expected  /tmp/splitsh-lite" | sha256sum -c -
          chmod +x /tmp/splitsh-lite
          /tmp/splitsh-lite --version

      - name: Split + force-push each affected lib
        env:
          TOKEN: ${{ secrets.SUGARCRAFT_SYNC_TOKEN }}
          FORCE_ALL: ${{ steps.affected.outputs.force_all }}
          AFFECTED_LIBS: ${{ steps.affected.outputs.affected_libs }}
          # Packagist auto-update: a sugarcraft/<lib> split repo only re-crawls
          # on Packagist if it carries the per-repo Packagist webhook, and a
          # FRESHLY-CREATED split repo starts WITHOUT it — which is how several
          # libs (candy-buffer, candy-forms, candy-focus, sugar-gallery, …)
          # silently stopped auto-updating, forcing a manual "Update" on
          # packagist.org. To make the system self-healing, we ALSO ping
          # Packagist's update-package API for every lib we push here, so a
          # missing/misconfigured webhook can never strand a package on a stale
          # dev-master again. Non-fatal: a package not yet registered on
          # Packagist (new lib) just logs a non-200 and the sync continues.
          PACKAGIST_USERNAME: detain
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
          set -euo pipefail

          # Retry function for git push operations with exponential backoff
          retry_git_push() {
            local max_attempts=3
            local delay=5
            local attempt=1
            while (( attempt <= max_attempts )); do
              if "$@"; then
                return 0
              fi
              echo "Push failed (attempt $attempt/$max_attempts), waiting ${delay}s..." >&2
              sleep $delay
              ((attempt++))
              delay=$((delay * 2))
            done
            echo "Push failed after $max_attempts attempts" >&2
            return 1
          }

          force_all="$FORCE_ALL"
          libs_str="$AFFECTED_LIBS"

          if [ "$force_all" = "yes" ]; then
            # Monorepo-wide change: push all libs
            echo "force_all=yes — pushing all libs"
            mapfile -t libs < <(php scripts/affected-libs.php --all 2>/dev/null | python3 -c "import json,sys; print('\n'.join(json.load(sys.stdin)['all_libs']))")
            # An empty force-all list means affected-libs.php (or php) failed — a
            # process-sub failure can't trip `set -e`, so fail loudly here rather
            # than silently "syncing" zero libs and reporting success.
            if [ "${#libs[@]}" -eq 0 ]; then
              echo "force_all but lib list is empty — affected-libs.php --all produced nothing" >&2
              exit 1
            fi
          else
            # Changed-only: push only affected libs
            echo "Pushing affected libs:"
            echo "$libs_str"
            mapfile -t libs < <(echo "$libs_str" | grep -v '^$')
          fi

          for lib in "${libs[@]}"; do
            [ -d "$lib" ] || { echo "skip $lib (no dir)"; continue; }
            # splitsh-lite prints the split-commit SHA for the prefix on stdout.
            sha=$(/tmp/splitsh-lite --prefix="$lib")
            retry_git_push git push --force \
              "https://x-access-token:$TOKEN@github.com/sugarcraft/$lib.git" \
              "$sha:refs/heads/master"
            echo "✓ synced $lib ($sha)"

            # Belt-and-suspenders Packagist re-crawl (see env note above).
            # Guarded on the token so a fork/secret-less run skips it cleanly;
            # the `|| true` keeps a transient Packagist hiccup from failing the
            # whole sync (the per-repo webhook is still the primary path).
            if [ -n "${PACKAGIST_TOKEN:-}" ]; then
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 -XPOST \
                -H 'content-type: application/json' \
                "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_TOKEN}" \
                -d "{\"repository\":{\"url\":\"https://github.com/sugarcraft/$lib\"}}" || echo "000")
              echo "  ↳ packagist update $lib → HTTP $code"
            fi
          done
          echo "Done — ${#libs[@]} libs pushed"

  sync-site:
    name: Push docs/ to sugarcraft/sugarcraft.github.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Mirror docs/ → sugarcraft.github.io master
        env:
          TOKEN: ${{ secrets.SUGARCRAFT_SYNC_TOKEN }}
        run: |
          set -euo pipefail

          # Retry function for git push operations with exponential backoff
          retry_git_push() {
            local max_attempts=3
            local delay=5
            local attempt=1
            while (( attempt <= max_attempts )); do
              if "$@"; then
                return 0
              fi
              echo "Push failed (attempt $attempt/$max_attempts), waiting ${delay}s..." >&2
              sleep $delay
              ((attempt++))
              delay=$((delay * 2))
            done
            echo "Push failed after $max_attempts attempts" >&2
            return 1
          }

          tmp=$(mktemp -d)
          git clone --quiet \
            "https://x-access-token:$TOKEN@github.com/sugarcraft/sugarcraft.github.io.git" \
            "$tmp/site"
          rsync -a --delete --exclude=.git ./docs/ "$tmp/site/"
          cd "$tmp/site"
          git config user.name  'Joe Huss'
          git config user.email 'detain@interserver.net'
          git add -A
          if git diff --cached --quiet; then
            echo "site already in sync"
            exit 0
          fi
          git commit --quiet -m "Sync from monorepo @ ${GITHUB_SHA:0:7}"
          retry_git_push git push --quiet origin master
          echo "✓ pushed site update"
