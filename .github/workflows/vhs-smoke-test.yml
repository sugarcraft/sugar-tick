name: VHS smoke test

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, json, pcntl, gd, curl, ssh2, ffi
          tools: composer:v2

      - name: Install composer deps
        run: composer install --quiet

      - name: Locate smoke tape
        id: tape
        run: |
          set -euo pipefail
          for c in candy-vcr/.vhs/smoke.tape candy-vcr/tests/golden/tapes/03-plain-typing.tape; do
            if [ -f "$c" ]; then
              echo "path=$c" >> "$GITHUB_OUTPUT"
              echo "Using tape: $c"
              exit 0
            fi
          done
          echo "ERROR: no smoke tape found in expected locations" >&2
          exit 1

      - name: Run smoke tape (timeout 90s)
        timeout-minutes: 2
        run: timeout 90 php vendor/bin/candy-vcr render-tape "${{ steps.tape.outputs.path }}" --output /tmp/smoke.gif

      - name: Verify output
        run: |
          set -euo pipefail
          if [ ! -s /tmp/smoke.gif ]; then
            echo "ERROR: /tmp/smoke.gif is empty or missing"
            exit 1
          fi
          file_out=$(file /tmp/smoke.gif)
          echo "file output: $file_out"
          if ! echo "$file_out" | grep -q "GIF image"; then
            echo "ERROR: /tmp/smoke.gif is not a GIF image"
            exit 1
          fi
          echo "Smoke test passed"
